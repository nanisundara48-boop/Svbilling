<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Billing App</title>
  <style>
    /* 🌟 GLASSMORPHISM & THEME 🌟 */
    :root {
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.3);
      --text-color: #fff;
    }

    body.dark-mode {
      --bg-gradient: linear-gradient(135deg, #1a2a6c 0%, #112 100%);
      --glass-bg: rgba(0, 0, 0, 0.4);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-color: #e0e0e0;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.5s;
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      width: 90%;
      max-width: 800px;
    }

    h2, h3 { text-align: center; margin-top: 0; }

    input, button, select {
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      box-sizing: border-box;
    }

    input, select {
      background: rgba(255, 255, 255, 0.2);
      color: var(--text-color);
      border: 1px solid var(--glass-border);
    }
    input::placeholder { color: #ddd; }
    select option { background: #764ba2; color: white; }

    button {
      background: #4facfe;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover { background: #00f2fe; }
    
    .btn-danger { background: #ff4b2b; }
    .btn-danger:hover { background: #ff416c; }
    .btn-success { background: #00b09b; }
    .btn-success:hover { background: #96c93d; }

    /* Layout Grids */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    
    /* Lists */
    .item-list {
      margin-top: 15px;
      background: rgba(0,0,0,0.2);
      padding: 15px;
      border-radius: 10px;
      max-height: 200px;
      overflow-y: auto;
    }
    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .action-btns button { width: auto; padding: 5px 10px; margin: 0 2px; font-size: 12px; }

    #dashboard { display: none; }
    .nav-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .nav-bar button { width: auto; padding: 8px 15px; }
  </style>
</head>
<body>

  <div class="glass-panel" id="auth-section" style="max-width: 400px;">
    <h2 id="auth-title">Login</h2>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button id="auth-btn" onclick="handleAuth()">Login</button>
    <p style="text-align:center; font-size: 14px; cursor: pointer; text-decoration: underline;" onclick="toggleAuthMode()" id="toggle-txt">New user? Create Account</p>
  </div>

  <div class="glass-panel" id="dashboard">
    <div class="nav-bar">
      <h3>Store Dashboard</h3>
      <div>
        <button onclick="toggleTheme()">🌓 Theme</button>
        <button class="btn-danger" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="grid-2">
      <div>
        <h3>Manage Products</h3>
        <input type="text" id="prod-name" placeholder="Product Name (e.g. Polyking)">
        <input type="number" id="prod-price" placeholder="Price per Kg (₹)">
        <button onclick="saveProduct()">➕ Add Product</button>
        <div class="item-list" id="products-list">Loading products...</div>
      </div>

      <div>
        <h3>New Bill</h3>
        <input type="text" id="cust-name" placeholder="Customer Name">
        <input type="number" id="cust-phone" placeholder="WhatsApp Number (10 digits)">
        
        <select id="select-product"></select>
        <input type="number" id="qty" placeholder="Quantity (Kg)" step="0.01">
        <button class="btn-success" onclick="addToCart()">🛒 Add to Bill</button>
        
        <div class="item-list" id="cart-list">Cart is empty</div>
        <h3 style="text-align: right;">Total: ₹<span id="total-amount">0</span></h3>
        <button onclick="sendWhatsAppBill()">📲 Send Bill via WhatsApp</button>
      </div>
    </div>
  </div>

<script type="module">
  // 1. Firebase SDK Imports
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  // 2. Firebase Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyDMSGPEngVmGtTRfcnIC4unH7Rh3FwgcRE",
    authDomain: "sv-billing-250c2.firebaseapp.com",
    projectId: "sv-billing-250c2",
    storageBucket: "sv-billing-250c2.firebasestorage.app",
    messagingSenderId: "847927101892",
    appId: "1:847927101892:web:800c182fe47f133d537c91"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Global Variables
  let isLoginMode = true;
  let currentUserId = null;
  let cart = [];
  let cartTotal = 0;

  // --- UI TOGGLES ---
  window.toggleTheme = () => document.body.classList.toggle('dark-mode');
  
  window.toggleAuthMode = () => {
    isLoginMode = !isLoginMode;
    document.getElementById('auth-title').innerText = isLoginMode ? "Login" : "Register";
    document.getElementById('auth-btn').innerText = isLoginMode ? "Login" : "Create Account";
    document.getElementById('toggle-txt').innerText = isLoginMode ? "New user? Create Account" : "Already have an account? Login";
  };

  // --- AUTHENTICATION ---
  window.handleAuth = () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if(!email || !password) return alert("Please enter email and password");

    const authPromise = isLoginMode 
      ? signInWithEmailAndPassword(auth, email, password)
      : createUserWithEmailAndPassword(auth, email, password);

    authPromise.catch(error => alert("Error: " + error.message));
  };

  window.logout = () => signOut(auth);

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUserId = user.uid;
      document.getElementById('auth-section').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadProducts(); // Load ONLY this user's data
    } else {
      currentUserId = null;
      document.getElementById('auth-section').style.display = 'block';
      document.getElementById('dashboard').style.display = 'none';
    }
  });

  // --- PRODUCTS CRUD (Evari data vallake) ---
  window.saveProduct = async () => {
    const name = document.getElementById('prod-name').value;
    const price = parseFloat(document.getElementById('prod-price').value);
    
    if(!name || !price) return alert("Enter Product Name and Price!");

    await addDoc(collection(db, "products"), {
      userId: currentUserId,
      name: name,
      price: price
    });
    
    document.getElementById('prod-name').value = '';
    document.getElementById('prod-price').value = '';
    loadProducts();
  };

  window.loadProducts = async () => {
    const q = query(collection(db, "products"), where("userId", "==", currentUserId));
    const snapshot = await getDocs(q);
    
    let html = '';
    let optionsHtml = '<option value="">-- Select Product --</option>';
    
    snapshot.forEach(doc => {
      const p = doc.data();
      html += `
        <div class="item-row">
          <span>${p.name} (₹${p.price})</span>
          <div class="action-btns">
            <button onclick="editProduct('${doc.id}', '${p.name}', ${p.price})">✏️</button>
            <button class="btn-danger" onclick="deleteProduct('${doc.id}')">🗑️</button>
          </div>
        </div>`;
      optionsHtml += `<option value='{"name":"${p.name}", "price":${p.price}}'>${p.name} - ₹${p.price}</option>`;
    });

    document.getElementById('products-list').innerHTML = html || "No products added yet.";
    document.getElementById('select-product').innerHTML = optionsHtml;
  };

  window.editProduct = async (id, oldName, oldPrice) => {
    const newName = prompt("Edit Name:", oldName);
    const newPrice = prompt("Edit Price:", oldPrice);
    if(newName && newPrice) {
      await updateDoc(doc(db, "products", id), { name: newName, price: parseFloat(newPrice) });
      loadProducts();
    }
  };

  window.deleteProduct = async (id) => {
    if(confirm("Are you sure you want to delete this product?")) {
      await deleteDoc(doc(db, "products", id));
      loadProducts();
    }
  };

  // --- BILLING / CART LOGIC ---
  window.addToCart = () => {
    const prodVal = document.getElementById('select-product').value;
    const qty = parseFloat(document.getElementById('qty').value);
    
    if(!prodVal || !qty) return alert("Select product and enter quantity!");
    
    const product = JSON.parse(prodVal);
    const itemTotal = product.price * qty;
    
    cart.push({ name: product.name, price: product.price, qty: qty, total: itemTotal });
    updateCartUI();
  };

  function updateCartUI() {
    let html = '';
    cartTotal = 0;
    cart.forEach((item, index) => {
      cartTotal += item.total;
      html += `
        <div class="item-row">
          <span>${item.name} (${item.qty}kg)</span>
          <span>₹${item.total.toFixed(2)}</span>
        </div>`;
    });
    document.getElementById('cart-list').innerHTML = html || "Cart is empty";
    document.getElementById('total-amount').innerText = cartTotal.toFixed(2);
  }

  // --- PERFECT WHATSAPP BILL (NO ? MARKS) ---
  window.sendWhatsAppBill = () => {
    const custName = document.getElementById('cust-name').value;
    const phone = document.getElementById('cust-phone').value;
    
    if(!custName || phone.length < 10 || cart.length === 0) {
      return alert("Enter customer details and add items to cart!");
    }

    const date = new Date().toLocaleDateString('en-IN');
    const time = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

    let msg = `🧾 *SRI VENKATESWARA*\n📞 7997195592\n\n`;
    msg += `👤 *Customer:* ${custName}\n`;
    msg += `📅 *Date:* ${date} | ⏰ *Time:* ${time}\n`;
    msg += `----------------------------------\n`;
    msg += `*BILL DETAILS:*\n\n`;

    cart.forEach(item => {
      msg += `📦 *${item.name}*\n     ${item.qty} kg ➔ ₹${item.total.toFixed(2)}\n`;
    });

    msg += `----------------------------------\n`;
    msg += `💰 *TOTAL AMOUNT : ₹${cartTotal.toFixed(2)}*\n`;
    msg += `----------------------------------\n`;
    msg += `⏳ * Pay the bill within 15 days *\n\n🙏 Thank you! Visit Again!`;

    // Encode URI Component removes the ? marks issue
    const encodedMsg = encodeURIComponent(msg);
    const whatsappUrl = `https://wa.me/91${phone}?text=${encodedMsg}`;
    
    window.open(whatsappUrl, '_blank');
    
    // Clear cart after sending
    cart = []; updateCartUI();
    document.getElementById('qty').value = '';
  };

</script>
</body>
</html>
